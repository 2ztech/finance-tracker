version: '3.8'

services:
  finance-tracker:
    build: .
    container_name: finance-tracker
    ports:
      - "8000:80"  # Maps port 8000 on your host to port 80 in the container
    volumes:
      # This maps your local 'data' folder to the container's 'data' folder.
      # This ensures your finance.db file survives container rebuilds.
      - ./data:/var/www/html/data
    restart: unless-stopped